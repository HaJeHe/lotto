<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로또 번호 예측기</title>
<style>
:root {
  --bg:#0f0f1a; --card:#1a1a2e; --accent:#e94560;
  --accent2:#0f3460; --text:#eaeaea; --sub:#888;
  --gold:#ffd700; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  min-height:100vh;padding:16px;max-width:480px;margin:0 auto;}
.header{text-align:center;padding:20px 0 14px;}
.header h1{font-size:1.5rem;font-weight:800;}
.header h1 span{color:var(--accent);}
.header p{color:var(--sub);font-size:0.8rem;margin-top:4px;}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.card-title{font-size:0.75rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.strat-btn{background:var(--accent2);border:2px solid transparent;border-radius:10px;
  color:var(--text);padding:10px 4px;font-size:0.8rem;text-align:center;
  cursor:pointer;line-height:1.4;transition:all 0.2s;width:100%;}
.strat-btn.active{border-color:var(--accent);background:#1e1e3f;color:var(--accent);font-weight:700;}
.slider-row{display:flex;align-items:center;gap:10px;}
input[type=range]{flex:1;accent-color:var(--accent);height:4px;}
.count-badge{background:var(--accent);color:#fff;border-radius:8px;
  padding:2px 10px;font-weight:700;font-size:1rem;min-width:36px;text-align:center;}
.gen-btn{width:100%;background:linear-gradient(135deg,var(--accent),#c0392b);
  border:none;border-radius:var(--radius);color:#fff;font-size:1.05rem;
  font-weight:700;padding:16px;cursor:pointer;margin-bottom:14px;
  -webkit-appearance:none;touch-action:manipulation;}
.gen-btn:active{opacity:0.75;}
.result-set{background:#0d0d1f;border-radius:10px;padding:12px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.set-label{color:var(--sub);font-size:0.75rem;min-width:42px;}
.balls{display:flex;gap:6px;flex-wrap:wrap;}
.ball{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:0.88rem;color:#fff;flex-shrink:0;}
.b1 {background:#f5c518;color:#333;}
.b11{background:#4fc3f7;color:#1a1a2e;}
.b21{background:#ff7043;}
.b31{background:#9575cd;}
.b41{background:#66bb6a;}
.freq-list{display:flex;flex-direction:column;gap:6px;}
.freq-row{display:flex;align-items:center;gap:8px;font-size:0.8rem;}
.freq-num{width:28px;text-align:right;font-weight:700;color:var(--gold);}
.freq-bar-wrap{flex:1;background:#111;border-radius:4px;height:14px;overflow:hidden;}
.freq-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px;}
.freq-cnt{color:var(--sub);font-size:0.72rem;min-width:32px;text-align:right;}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:#111;
  border-radius:var(--radius);padding:3px;margin-bottom:14px;}
.tab{border:none;border-radius:11px;padding:10px;font-size:0.85rem;font-weight:600;
  cursor:pointer;background:transparent;color:var(--sub);touch-action:manipulation;}
.tab.active{background:var(--card);color:var(--text);}
.section{display:none;}
.section.visible{display:block;}
.footer{text-align:center;color:var(--sub);font-size:0.72rem;padding:20px 0 10px;}
.opt-row{display:flex;align-items:center;gap:10px;cursor:pointer;}
.opt-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;}
.opt-label{font-size:0.9rem;font-weight:600;}
#notice{background:#2a2a00;color:#ffd54f;border-radius:8px;padding:8px 12px;
  margin-bottom:10px;font-size:0.75rem;display:none;}
#errbox{background:#3a0000;color:#ff6b6b;border-radius:8px;padding:10px;
  margin-bottom:10px;font-size:0.8rem;display:none;}
</style>
</head>
<body>

<div class="header">
  <h1><span>LOTTO</span> 예측기</h1>
  <p>빈도 기반 가중치 랜덤 번호 생성</p>
</div>

<div id="errbox"></div>

<div class="tabs">
  <button class="tab active" id="tabPredict">번호 예측</button>
  <button class="tab" id="tabFreq">빈도 분석</button>
</div>

<div id="tab-predict" class="section visible">
  <div class="card">
    <div class="card-title">전략 선택</div>
    <div class="strategy-grid">
      <button class="strat-btn active" id="btnWeighted">빈도<br>가중치</button>
      <button class="strat-btn" id="btnTopHeavy">상위<br>집중형</button>
      <button class="strat-btn" id="btnMixed">혼합형</button>
      <button class="strat-btn" id="btnUnpopular">비인기<br>가중치</button>
    </div>
    <div id="stratDesc" style="margin-top:10px;font-size:0.75rem;color:var(--sub);line-height:1.5;">
      많이 나온 번호일수록 뽑힐 확률이 높아집니다.
    </div>
  </div>

  <div class="card">
    <div class="card-title">조합 수</div>
    <div class="slider-row">
      <span style="font-size:0.8rem;color:var(--sub)">1</span>
      <input type="range" id="countSlider" min="1" max="10" value="5">
      <span style="font-size:0.8rem;color:var(--sub)">10</span>
      <div class="count-badge" id="countBadge">5</div>
    </div>
  </div>

  <div class="card">
    <label class="opt-row" for="chkNoOverlap">
      <input type="checkbox" id="chkNoOverlap">
      <span class="opt-label">조합 간 번호 중복 방지</span>
    </label>
    <div style="margin-top:6px;font-size:0.72rem;color:var(--sub);line-height:1.5;">
      켜면 모든 조합에 같은 번호가 한 번도 안 나옵니다. (최대 7조합까지 가능)
    </div>
  </div>

  <button class="gen-btn" id="genBtn">&#127922; 번호 생성</button>
  <div id="notice"></div>
  <div id="results"></div>
</div>

<div id="tab-freq" class="section">
  <div class="card">
    <div class="card-title">번호별 출현 빈도 — 실제 1~1204회차 (2002.12~2025.12)</div>
    <div class="freq-list" id="freqList"></div>
  </div>
</div>

<div class="footer">* 통계 기반 참고용입니다. 당첨을 보장하지 않습니다.</div>

<script>
(function() {
  "use strict";

  // ── 에러 표시 ──────────────────────────────────────────
  function showErr(msg) {
    var el = document.getElementById("errbox");
    el.textContent = "오류: " + msg;
    el.style.display = "block";
  }

  // ── 데이터: 실제 당첨 통계 (1~1204회차, 2002.12 ~ 2025.12) ──
  // 동행복권 공식 당첨번호 기준 본번호 6개 출현 횟수 (보너스 제외)
  var TOTAL_ROUNDS = 1204;
  var FREQ = {1:164,2:151,3:168,4:158,5:151,6:162,7:167,8:154,9:132,10:157,
              11:163,12:177,13:174,14:169,15:162,16:165,17:166,18:172,19:165,20:166,
              21:164,22:140,23:144,24:162,25:148,26:162,27:173,28:151,29:152,30:154,
              31:162,32:141,33:172,34:181,35:159,36:160,37:170,38:164,39:164,40:171,
              41:145,42:151,43:162,44:159,45:170};

  // ── 비인기 가중치 (적게 나온 번호일수록 높은 가중치) ──
  // 당첨 확률은 동일하지만, 남들이 안 고르는 번호라 당첨 시 독식 가능성이 높음
  var INV_FREQ = {};
  (function() {
    var maxW = 0, minW = 99999;
    for (var i = 1; i <= 45; i++) {
      if (FREQ[i] > maxW) maxW = FREQ[i];
      if (FREQ[i] < minW) minW = FREQ[i];
    }
    for (var j = 1; j <= 45; j++) {
      INV_FREQ[j] = (maxW + minW) - FREQ[j]; // 빈도 뒤집기
    }
  })();

  // ── 가중치 비복원 추출 ─────────────────────────────────
  // exclude: 뽑으면 안 되는 번호 목록 (조합 간 중복 방지용)
  function weightedSample(count, table, exclude) {
    var freqTable = table || FREQ;
    var pool = [];
    for (var i = 1; i <= 45; i++) {
      if (exclude && exclude.indexOf(i) >= 0) continue;
      pool.push({ num: i, w: freqTable[i] || 1 });
    }

    var picked = [];
    for (var k = 0; k < count; k++) {
      var total = 0;
      for (var j = 0; j < pool.length; j++) total += pool[j].w;
      var r = Math.random() * total;
      var chosen = pool.length - 1;
      for (var m = 0; m < pool.length; m++) {
        r -= pool[m].w;
        if (r <= 0) { chosen = m; break; }
      }
      picked.push(pool[chosen].num);
      pool.splice(chosen, 1);
    }
    return picked.sort(function(a, b) { return a - b; });
  }

  // ── 상위 집중형 ───────────────────────────────────────
  function topHeavySample(exclude) {
    var sorted = [];
    for (var n = 1; n <= 45; n++) {
      if (exclude && exclude.indexOf(n) >= 0) continue;
      sorted.push({ num: n, cnt: FREQ[n] || 0 });
    }
    sorted.sort(function(a, b) { return b.cnt - a.cnt; });

    var top = [], rest = [];
    for (var i = 0; i < sorted.length; i++) {
      if (i < 15) top.push(sorted[i].num);
      else rest.push(sorted[i].num);
    }

    function pick(arr, cnt) {
      var cp = arr.slice(), r = [];
      for (var i = 0; i < cnt; i++) {
        var idx = Math.floor(Math.random() * cp.length);
        r.push(cp.splice(idx, 1)[0]);
      }
      return r;
    }

    // 중복 방지로 풀이 줄었을 때: top에서 최대 4개, 부족분은 rest에서
    var nTop = Math.min(4, top.length);
    var nRest = 6 - nTop;
    if (nRest > rest.length) { nTop = 6 - rest.length; nRest = rest.length; }
    var res = pick(top, nTop).concat(pick(rest, nRest));
    return res.sort(function(a, b) { return a - b; });
  }

  // ── 상태 ──────────────────────────────────────────────
  var strategy = "weighted";

  // ── 번호 공 색상 ──────────────────────────────────────
  function ballClass(n) {
    if (n <= 10) return "b1";
    if (n <= 20) return "b11";
    if (n <= 30) return "b21";
    if (n <= 40) return "b31";
    return "b41";
  }

  // ── 결과 렌더링 ───────────────────────────────────────
  function renderResults(sets) {
    var el = document.getElementById("results");
    var html = "";
    for (var i = 0; i < sets.length; i++) {
      var nums = sets[i];
      var balls = "";
      for (var j = 0; j < nums.length; j++) {
        balls += '<div class="ball ' + ballClass(nums[j]) + '">' + nums[j] + '</div>';
      }
      html += '<div class="result-set"><div class="set-label">조합 ' + (i+1) + '</div>'
            + '<div class="balls">' + balls + '</div></div>';
    }
    el.innerHTML = html;
  }

  // ── 번호 생성 ─────────────────────────────────────────
  function generate() {
    try {
      var n = parseInt(document.getElementById("countSlider").value, 10) || 5;
      var noOverlap = document.getElementById("chkNoOverlap").checked;
      var noticeEl = document.getElementById("notice");
      noticeEl.style.display = "none";

      // 중복 방지 시 45개 / 6개 = 최대 7조합
      if (noOverlap && n > 7) {
        n = 7;
        noticeEl.textContent = "중복 방지 모드에서는 최대 7조합까지만 생성됩니다. (45개 번호 ÷ 6개)";
        noticeEl.style.display = "block";
      }

      var used = [];   // 이미 사용된 번호 (중복 방지 모드에서만 누적)
      var sets = [];
      for (var i = 0; i < n; i++) {
        var exclude = noOverlap ? used : null;
        var one;
        if (strategy === "top_heavy") {
          one = topHeavySample(exclude);
        } else if (strategy === "mixed") {
          one = (i % 2 === 0) ? weightedSample(6, null, exclude) : topHeavySample(exclude);
        } else if (strategy === "unpopular") {
          one = weightedSample(6, INV_FREQ, exclude);
        } else {
          one = weightedSample(6, null, exclude);
        }
        sets.push(one);
        if (noOverlap) used = used.concat(one);
      }
      renderResults(sets);
    } catch(e) {
      showErr(e.message);
    }
  }

  // ── 빈도 차트 (45개 전체, 출현 순) ────────────────────
  function renderFreq() {
    var sorted = [];
    for (var n = 1; n <= 45; n++) sorted.push({ num: n, cnt: FREQ[n] });
    sorted.sort(function(a, b) { return b.cnt - a.cnt; });
    var maxCnt = sorted[0].cnt;
    var minCnt = sorted[sorted.length - 1].cnt;

    var html = "";
    for (var i = 0; i < sorted.length; i++) {
      var pct = (sorted[i].cnt / maxCnt * 100).toFixed(1);
      var mark = sorted[i].cnt === maxCnt ? " 최다" : (sorted[i].cnt === minCnt ? " 최소" : "");
      html += '<div class="freq-row">'
            + '<div class="freq-num">' + sorted[i].num + '</div>'
            + '<div class="freq-bar-wrap"><div class="freq-bar" style="width:' + pct + '%"></div></div>'
            + '<div class="freq-cnt">' + sorted[i].cnt + '회' + mark + '</div>'
            + '</div>';
    }
    document.getElementById("freqList").innerHTML = html;
  }

  // ── 탭 전환 ───────────────────────────────────────────
  function switchTab(tab) {
    var tPredict = document.getElementById("tab-predict");
    var tFreq    = document.getElementById("tab-freq");
    var bPredict = document.getElementById("tabPredict");
    var bFreq    = document.getElementById("tabFreq");

    if (tab === "predict") {
      tPredict.className = "section visible";
      tFreq.className    = "section";
      bPredict.className = "tab active";
      bFreq.className    = "tab";
    } else {
      tPredict.className = "section";
      tFreq.className    = "section visible";
      bPredict.className = "tab";
      bFreq.className    = "tab active";
      renderFreq();
    }
  }

  // ── 이벤트 연결 (DOMContentLoaded 보장) ──────────────
  function init() {
    try {
      // 탭
      document.getElementById("tabPredict").addEventListener("click", function() { switchTab("predict"); });
      document.getElementById("tabFreq").addEventListener("click", function() { switchTab("freq"); });

      // 전략 버튼 (공통 처리)
      var STRATS = [
        { id: "btnWeighted", key: "weighted",
          desc: "많이 나온 번호일수록 뽑힐 확률이 높아집니다." },
        { id: "btnTopHeavy", key: "top_heavy",
          desc: "역대 최다 출현 15개 번호에서 4개 + 나머지에서 2개를 뽑습니다." },
        { id: "btnMixed", key: "mixed",
          desc: "빈도 가중치와 상위 집중형을 번갈아 사용합니다." },
        { id: "btnUnpopular", key: "unpopular",
          desc: "적게 나온 번호일수록 뽑힐 확률이 높아집니다. 당첨 확률은 같지만 남들이 잘 안 고르는 번호라 당첨 시 혼자 받을 가능성이 높아집니다." }
      ];
      STRATS.forEach(function(s) {
        document.getElementById(s.id).addEventListener("click", function() {
          strategy = s.key;
          STRATS.forEach(function(o) {
            document.getElementById(o.id).className =
              (o.key === s.key) ? "strat-btn active" : "strat-btn";
          });
          document.getElementById("stratDesc").textContent = s.desc;
        });
      });

      // 슬라이더
      document.getElementById("countSlider").addEventListener("input", function() {
        document.getElementById("countBadge").textContent = this.value;
      });

      // 번호 생성 버튼
      document.getElementById("genBtn").addEventListener("click", generate);

      // 초기 생성
      generate();

    } catch(e) {
      showErr("초기화 실패: " + e.message);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
